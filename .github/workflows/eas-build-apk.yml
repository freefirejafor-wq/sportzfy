name: 🏗️ Build Sportzfy APK (EAS)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sportzfy-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development

jobs:
  build-android:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ EAS Cloud Build (wait for completion)
        working-directory: artifacts/sportzfy-mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-build.log
          echo "--- Build log ---"
          cat /tmp/eas-build.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK from EAS
        working-directory: artifacts/sportzfy-mobile
        run: |
          mkdir -p build

          # Save raw output (may contain warnings before JSON)
          eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json > /tmp/eas-builds.txt 2>/dev/null || true

          echo "=== EAS build list output (first 5 lines) ==="
          head -5 /tmp/eas-builds.txt

          # Node.js extracts JSON array even with non-JSON prefix lines
          BUILD_URL=$(node -e "
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/eas-builds.txt', 'utf8');
            const match = raw.match(/\[[\s\S]*\]/);
            if (!match) { process.exit(0); }
            try {
              const builds = JSON.parse(match[0]);
              const url = builds[0]?.artifacts?.buildUrl || '';
              if (url) console.log(url);
            } catch(e) {}
          " 2>/dev/null)

          echo "APK URL: $BUILD_URL"

          if [ -n "$BUILD_URL" ] && [ "$BUILD_URL" != "null" ]; then
            curl -fL "$BUILD_URL" -o ./build/sportzfy.apk
            echo "✅ APK: $(du -sh ./build/sportzfy.apk)"
          else
            # Fallback: grep .apk URL from the EAS build log
            FALLBACK=$(grep -oE 'https://[^ ]+\.apk' /tmp/eas-build.log | head -1)
            if [ -n "$FALLBACK" ]; then
              curl -fL "$FALLBACK" -o ./build/sportzfy.apk
              echo "✅ APK downloaded via log URL"
            else
              echo "=== Last 30 lines of EAS build log ==="
              tail -30 /tmp/eas-build.log
              echo "=== Full eas-builds.txt ==="
              cat /tmp/eas-builds.txt
              echo "❌ No APK URL found"
              exit 1
            fi
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportzfy-apk
          path: artifacts/sportzfy-mobile/build/sportzfy.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Sportzfy APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Android APK" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download **sportzfy-apk** from Artifacts above" >> $GITHUB_STEP_SUMMARY
