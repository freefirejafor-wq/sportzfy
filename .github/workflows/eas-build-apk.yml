name: 🏗️ Build Sportzfy APK (EAS)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sportzfy-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development

jobs:
  build-android:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: ✅ Verify EAS project config
        working-directory: artifacts/sportzfy-mobile
        run: |
          echo "=== app.json extra.eas check ==="
          cat app.json | grep -A3 '"eas"' || echo "No eas section found"
          echo "=== eas whoami ==="
          eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ EAS Cloud Build
        working-directory: artifacts/sportzfy-mobile
        run: |
          echo "Starting EAS build..."
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-build.log
          echo "=== Build log tail ==="
          tail -30 /tmp/eas-build.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK
        working-directory: artifacts/sportzfy-mobile
        run: |
          mkdir -p build

          # Extract URL from EAS build log
          APK_URL=$(grep -oE 'https://[^ ]+\.apk' /tmp/eas-build.log | head -1 || true)

          # Fallback: use eas build:list
          if [ -z "$APK_URL" ]; then
            echo "Trying eas build:list..."
            eas build:list \
              --platform android \
              --status finished \
              --limit 1 \
              --non-interactive \
              --json 2>/dev/null > /tmp/builds.json || true
            cat /tmp/builds.json
            APK_URL=$(node -e "
              try {
                const b = JSON.parse(require('fs').readFileSync('/tmp/builds.json','utf8'));
                const arr = Array.isArray(b) ? b : [b];
                console.log(arr[0]?.artifacts?.buildUrl || '');
              } catch(e) { console.log(''); }
            " 2>/dev/null || true)
          fi

          echo "APK URL: $APK_URL"
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "❌ No APK URL found"
            echo "=== Full EAS log ==="
            cat /tmp/eas-build.log
            exit 1
          fi

          curl -fL "$APK_URL" -o ./build/sportzfy.apk
          echo "✅ APK: $(du -sh ./build/sportzfy.apk)"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sportzfy-apk
          path: artifacts/sportzfy-mobile/build/sportzfy.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Sportzfy APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download **sportzfy-apk** from Artifacts above" >> $GITHUB_STEP_SUMMARY
