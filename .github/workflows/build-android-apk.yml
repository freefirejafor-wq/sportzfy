name: 🏗️ Build Sportzfy APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Grant Gradle Permission
        working-directory: android
        run: chmod +x gradlew

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK (signed — installable)
        working-directory: android
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug --stacktrace

      - name: 📝 Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/sportzfy.apk

      - name: ⬆️ Upload APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Sportzfy-APK
          path: android/app/build/outputs/apk/debug/sportzfy.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Sportzfy v${{ github.run_number }}"
          body: |
            ### 📱 Sportzfy Auto-Build

            **Version:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            #### ⬇️ Install করুন:
            নিচের `sportzfy.apk` ডাউনলোড করে মোবাইলে install করুন।
            Unknown sources চালু থাকলে app নিজে নিজে আপডেট হবে।

            > ✅ এই APK Debug-signed — সরাসরি install করা যাবে।
          files: android/app/build/outputs/apk/debug/sportzfy.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Build Summary
        run: |
          echo "## 🎉 Sportzfy v${{ github.run_number }} তৈরি হয়েছে!" >> $GITHUB_STEP_SUMMARY
          echo "- **Release**: https://github.com/${{ github.repository }}/releases/tag/v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
