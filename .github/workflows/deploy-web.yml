name: Deploy Web App to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create standalone package.json
        working-directory: artifacts/sportzfy
        run: |
          cat > package.standalone.json << 'PKGJSON'
          {
            "name": "sportzfy-web",
            "version": "1.0.0",
            "private": true,
            "type": "module",
            "scripts": {
              "build": "vite build --config vite.pages.config.ts"
            },
            "dependencies": {
              "react": "19.1.0",
              "react-dom": "19.1.0",
              "@tanstack/react-query": "^5.90.21",
              "framer-motion": "^12.0.0",
              "lucide-react": "^0.400.0",
              "wouter": "^3.3.5",
              "clsx": "^2.1.1",
              "class-variance-authority": "^0.7.1",
              "tailwind-merge": "^3.0.0",
              "date-fns": "^3.6.0",
              "embla-carousel-react": "^8.6.0",
              "hls.js": "^1.6.16",
              "plyr": "^3.8.4",
              "video.js": "^8.23.9",
              "react-hook-form": "^7.55.0",
              "@hookform/resolvers": "^3.10.0",
              "zod": "^3.25.76",
              "react-icons": "^5.4.0",
              "next-themes": "^0.4.6",
              "sonner": "^2.0.7",
              "recharts": "^2.15.2",
              "cmdk": "^1.1.1",
              "vaul": "^1.1.2",
              "input-otp": "^1.4.2",
              "react-day-picker": "^9.11.1",
              "react-resizable-panels": "^2.1.7",
              "tw-animate-css": "^1.4.0"
            },
            "devDependencies": {
              "@radix-ui/react-accordion": "^1.2.4",
              "@radix-ui/react-alert-dialog": "^1.1.7",
              "@radix-ui/react-aspect-ratio": "^1.1.3",
              "@radix-ui/react-avatar": "^1.1.4",
              "@radix-ui/react-checkbox": "^1.1.5",
              "@radix-ui/react-collapsible": "^1.1.4",
              "@radix-ui/react-context-menu": "^2.2.7",
              "@radix-ui/react-dialog": "^1.1.7",
              "@radix-ui/react-dropdown-menu": "^2.1.7",
              "@radix-ui/react-hover-card": "^1.1.7",
              "@radix-ui/react-label": "^2.1.3",
              "@radix-ui/react-menubar": "^1.1.7",
              "@radix-ui/react-navigation-menu": "^1.2.6",
              "@radix-ui/react-popover": "^1.1.7",
              "@radix-ui/react-progress": "^1.1.3",
              "@radix-ui/react-radio-group": "^1.2.4",
              "@radix-ui/react-scroll-area": "^1.2.4",
              "@radix-ui/react-select": "^2.1.7",
              "@radix-ui/react-separator": "^1.1.3",
              "@radix-ui/react-slider": "^1.2.4",
              "@radix-ui/react-slot": "^1.2.0",
              "@radix-ui/react-switch": "^1.1.4",
              "@radix-ui/react-tabs": "^1.1.4",
              "@radix-ui/react-toast": "^1.2.7",
              "@radix-ui/react-toggle": "^1.1.3",
              "@radix-ui/react-toggle-group": "^1.1.3",
              "@radix-ui/react-tooltip": "^1.2.0",
              "@tailwindcss/typography": "^0.5.15",
              "@vitejs/plugin-react": "^5.0.4",
              "@tailwindcss/vite": "^4.1.14",
              "@types/node": "^22.0.0",
              "@types/react": "^19.2.0",
              "@types/react-dom": "^19.2.0",
              "tailwindcss": "^4.1.14",
              "typescript": "^5.0.0",
              "vite": "^6.0.0"
            }
          }
          PKGJSON
          cp package.json package.original.json
          cp package.standalone.json package.json

      - name: Create GitHub Pages vite config
        working-directory: artifacts/sportzfy
        run: |
          cat > vite.pages.config.ts << 'EOF'
          import path from 'path';
          import react from '@vitejs/plugin-react';
          import tailwindcss from '@tailwindcss/vite';
          import { defineConfig } from 'vite';

          export default defineConfig({
            base: '/sportzfy/',
            plugins: [react(), tailwindcss()],
            resolve: {
              alias: {
                '@': path.resolve(__dirname, 'src'),
                '@assets': path.resolve(__dirname, '../../attached_assets'),
              },
              dedupe: ['react', 'react-dom'],
            },
            root: __dirname,
            build: {
              outDir: path.resolve(__dirname, 'dist/public'),
              emptyOutDir: true,
            },
          });
          EOF

      - name: Install dependencies
        working-directory: artifacts/sportzfy
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: artifacts/sportzfy
        env:
          NODE_ENV: production
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/sportzfy/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
