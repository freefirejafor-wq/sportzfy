name: 🏗️ Build Sportzfy APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sportzfy-mobile/**'
  workflow_dispatch:

jobs:
  build-android:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📥 Install monorepo dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup Expo CLI
        working-directory: artifacts/sportzfy-mobile
        run: npx expo --version

      - name: 🏗️ Expo Prebuild (generate Android project)
        working-directory: artifacts/sportzfy-mobile
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🔨 Build Debug APK with Gradle
        working-directory: artifacts/sportzfy-mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.daemon=false

      - name: 📋 Find APK
        id: find_apk
        run: |
          APK=$(find artifacts/sportzfy-mobile/android -name "*.apk" -not -path "*/test*" | head -1)
          echo "APK found: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh $(dirname "$APK") || true

      - name: 📤 Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportzfy-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Sportzfy APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "- **Type:** Debug APK (installable on any Android device)" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download **sportzfy-apk** from the Artifacts section above" >> $GITHUB_STEP_SUMMARY
