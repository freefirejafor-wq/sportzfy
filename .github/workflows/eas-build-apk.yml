name: 🏗️ Build Sportzfy APK (EAS)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sportzfy-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development

jobs:
  build-android:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ EAS Cloud Build (wait for completion)
        working-directory: artifacts/sportzfy-mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-build.log
          echo "--- Build log ---"
          cat /tmp/eas-build.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK from EAS
        working-directory: artifacts/sportzfy-mobile
        run: |
          mkdir -p build

          # Use jq to parse EAS build list JSON (jq is pre-installed on ubuntu-latest)
          BUILD_URL=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null | jq -r '.[0].artifacts.buildUrl // empty')

          echo "APK URL: $BUILD_URL"

          if [ -n "$BUILD_URL" ] && [ "$BUILD_URL" != "null" ]; then
            curl -fL "$BUILD_URL" -o ./build/sportzfy.apk
            echo "✅ APK size: $(du -sh ./build/sportzfy.apk)"
          else
            # Fallback: grep URL from EAS build log
            FALLBACK=$(grep -oE 'https://expo\.dev/artifacts/eas/[^ ]+' /tmp/eas-build.log | head -1)
            if [ -n "$FALLBACK" ]; then
              curl -fL "$FALLBACK" -o ./build/sportzfy.apk
              echo "✅ APK downloaded via log URL"
            else
              echo "Build log:"
              cat /tmp/eas-build.log | tail -30
              echo "❌ No APK URL found — check expo.dev"
              exit 1
            fi
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportzfy-apk
          path: artifacts/sportzfy-mobile/build/sportzfy.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Sportzfy APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Android APK" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download **sportzfy-apk** from Artifacts above" >> $GITHUB_STEP_SUMMARY
