name: 🏗️ Build Sportzfy APK (EAS)

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/sportzfy-mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - development

jobs:
  build-android:
    name: 🤖 Android APK Build
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 📥 Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 🔧 Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ EAS Cloud Build (wait for completion)
        working-directory: artifacts/sportzfy-mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --wait \
            2>&1 | tee /tmp/eas-build.log
          echo "--- Build log ---"
          cat /tmp/eas-build.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📥 Download APK from EAS
        working-directory: artifacts/sportzfy-mobile
        run: |
          mkdir -p build

          # Get the latest finished build's download URL
          BUILD_JSON=$(eas build:list \
            --platform android \
            --status finished \
            --limit 1 \
            --non-interactive \
            --json 2>/dev/null || echo "[]")

          BUILD_URL=$(node -e "
            const data = \`$BUILD_JSON\`;
            try {
              const builds = JSON.parse(data);
              const url = (builds[0] || {})?.artifacts?.buildUrl || '';
              console.log(url);
            } catch(e) { console.log(''); }
          ")

          echo "APK URL: $BUILD_URL"

          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o ./build/sportzfy.apk
            echo "✅ APK downloaded: $(du -sh ./build/sportzfy.apk)"
          else
            # Fallback: grep URL from build log
            FALLBACK_URL=$(grep -oP 'https://expo\.dev/artifacts/eas/[^\s"]+' /tmp/eas-build.log | head -1)
            if [ -n "$FALLBACK_URL" ]; then
              curl -L "$FALLBACK_URL" -o ./build/sportzfy.apk
              echo "✅ APK downloaded via fallback URL"
            else
              echo "❌ Could not find APK URL. Check expo.dev manually."
              exit 1
            fi
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportzfy-apk
          path: artifacts/sportzfy-mobile/build/sportzfy.apk
          if-no-files-found: error
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Sportzfy APK Ready!" >> $GITHUB_STEP_SUMMARY
          echo "- **Profile:** ${{ github.event.inputs.profile || 'preview' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Android APK" >> $GITHUB_STEP_SUMMARY
          echo "⬆️ Download **sportzfy-apk** from Artifacts above" >> $GITHUB_STEP_SUMMARY
